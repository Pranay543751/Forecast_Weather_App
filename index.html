<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather_App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Weather App</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter your city:">
            <button onclick="getweather()">Search</button>
        </div>
        <div class="weather-card">
            <h2 id="city">City</h2>
            <img id="weather-icon" src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="Weather Icon">
            <h1 id="temp">__°C
            </h1>
            <p id="condition">Weather Condition
            </p>

            <div class="details">
                <p> Humidity:
                    <span id="humidity">__</span>%
                </p>
                <p> Wind :
                    <span id="wind">__</span> km/h
                </p>
            </div>
        </div>
    </div>

    <script src="script.js">
    </script>
</body>

</html>
